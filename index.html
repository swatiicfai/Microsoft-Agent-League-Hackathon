<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoUI - AI Frontend Designer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NAV */
        nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
        .logo i { color: #60a5fa; }
        .badge { font-size: 11px; background: #334155; padding: 2px 8px; border-radius: 20px; color: #94a3b8; }
        .nav-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .btn-copy { background: #334155; color: #fff; }
        .btn-copy:hover { background: #475569; }
        .btn-dl { background: #2563eb; color: #fff; }
        .btn-dl:hover { background: #1d4ed8; }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        aside {
            width: 340px;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .section { padding: 16px; border-bottom: 1px solid #334155; }
        .section label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        /* KEY INPUT */
        .key-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            transition: border-color 0.2s;
        }
        .key-row:focus-within { border-color: #60a5fa; }
        .key-row i { color: #fbbf24; font-size: 13px; flex-shrink: 0; }
        .key-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 13px;
            min-width: 0;
        }
        .key-row input::placeholder { color: #475569; }
        .key-indicator { font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .key-indicator.ok { color: #4ade80; }
        .key-indicator.no { color: #64748b; }

        .key-hint {
            margin-top: 8px;
            font-size: 11px;
            color: #64748b;
            line-height: 1.5;
        }
        .key-hint a { color: #60a5fa; text-decoration: none; }
        .key-hint a:hover { text-decoration: underline; }

        /* PROMPT */
        textarea {
            width: 100%;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        textarea:focus { border-color: #60a5fa; }
        textarea::placeholder { color: #475569; }

        /* GENERATE BTN */
        .btn-generate {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .btn-generate:hover { opacity: 0.9; }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

        /* EXAMPLES */
        .examples { display: flex; flex-direction: column; gap: 6px; }
        .example-chip {
            padding: 8px 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .example-chip:hover { border-color: #60a5fa; color: #fff; background: #1e3a5f; }

        /* STATUS */
        .status-row {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
        .dot.spinning { background: #60a5fa; animation: pulse 1s infinite; }
        .dot.error { background: #f87171; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* PREVIEW */
        .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-bar {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .traffic { display: flex; gap: 6px; }
        .traffic span { width: 12px; height: 12px; border-radius: 50%; }
        .traffic .r { background: #ef4444; }
        .traffic .y { background: #eab308; }
        .traffic .g { background: #22c55e; }
        .preview-label { font-size: 12px; color: #64748b; margin-left: 4px; }
        iframe {
            flex: 1;
            border: none;
            background: #fff;
        }

        /* LOADING OVERLAY */
        #loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15,23,42,0.85);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }
        #loading-overlay.show { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #1e40af;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-overlay p { color: #94a3b8; font-size: 14px; }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 999;
        }
        #toast.show { display: flex; }
        #toast i { color: #4ade80; }

        /* TOGGLE */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #334155;
        }
        .toggle-label { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
        .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; inset: 0;
            background: #334155; border-radius: 20px;
            transition: 0.3s;
        }
        .slider:before {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            left: 3px; top: 3px;
            background: #fff; border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .slider { background: #7c3aed; }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="logo">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            AutoUI
            <span class="badge">by Swati Gupta</span>
        </div>
        <div class="nav-btns">
            <button class="btn btn-copy" id="copy-btn"><i class="fa-solid fa-copy"></i> Copy</button>
            <button class="btn btn-dl" id="dl-btn"><i class="fa-solid fa-download"></i> Download</button>
        </div>
    </nav>

    <!-- MAIN -->
    <main>
        <!-- SIDEBAR -->
        <aside>

            <!-- API KEY -->
            <div class="section">
                <label><i class="fa-solid fa-key" style="color:#fbbf24;margin-right:5px"></i>Gemini API Key</label>
                <div class="key-row">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="api-key" placeholder="Paste your API key here..." autocomplete="off" spellcheck="false">
                    <span class="key-indicator no" id="key-ind">No key</span>
                </div>
                <p class="key-hint">
                    Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a>
                    → Click <strong style="color:#fff">"Create API key"</strong> → Copy → Paste above
                </p>
            </div>

            <!-- PROMPT -->
            <div class="section">
                <label><i class="fa-solid fa-pen-nib" style="margin-right:5px;color:#a78bfa"></i>Describe Your UI</label>
                <textarea id="prompt" rows="5" placeholder="E.g. Dark login page with neon glow effects and glassmorphism card..."></textarea>
                <button class="btn-generate" id="gen-btn">
                    <i class="fa-solid fa-wand-magic-sparkles" style="margin-right:6px"></i>Generate UI
                </button>
            </div>

            <!-- EXAMPLES -->
            <div class="section">
                <label>Quick Examples</label>
                <div class="examples">
                    <button class="example-chip">Dark login page with neon glow effects</button>
                    <button class="example-chip">Analytics dashboard with charts and stats</button>
                    <button class="example-chip">SaaS landing page with pricing table</button>
                    <button class="example-chip">Portfolio with animated hero section</button>
                    <button class="example-chip">E-commerce product grid with filters</button>
                </div>
            </div>

            <!-- FOUNDRY TOGGLE -->
            <div class="toggle-row">
                <span class="toggle-label">
                    <i class="fa-solid fa-brain" style="color:#a78bfa"></i>
                    Foundry IQ Style Guide
                </span>
                <label class="toggle">
                    <input type="checkbox" id="foundry" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- STATUS -->
            <div class="status-row">
                <div class="dot" id="dot"></div>
                <span id="status-text">Ready</span>
            </div>

        </aside>

        <!-- PREVIEW -->
        <div class="preview-pane" style="position:relative">
            <div class="preview-bar">
                <div class="traffic">
                    <span class="r"></span>
                    <span class="y"></span>
                    <span class="g"></span>
                </div>
                <span class="preview-label">Live Preview</span>
            </div>
            <iframe id="preview" srcdoc="
                <html><body style='margin:0;min-height:100vh;display:flex;align-items:center;
                justify-content:center;background:linear-gradient(135deg,#0f172a,#1e293b);
                font-family:Segoe UI,sans-serif;'>
                <div style='text-align:center;color:#fff;'>
                    <div style='font-size:3rem;margin-bottom:12px'>✨</div>
                    <h1 style='font-size:1.6rem;font-weight:700;margin:0 0 8px'>AutoUI Ready</h1>
                    <p style='color:#94a3b8;font-size:0.9rem;margin:0'>Paste your API key and describe a UI to get started</p>
                </div></body></html>">
            </iframe>
            <div id="loading-overlay">
                <div class="spinner"></div>
                <p>AI is designing your UI...</p>
            </div>
        </div>
    </main>

    <!-- TOAST -->
    <div id="toast"><i class="fa-solid fa-circle-check"></i><span id="toast-msg"></span></div>

    <script>
        // ── Elements ──────────────────────────────────────────────────
        const apiKeyEl   = document.getElementById('api-key');
        const keyInd     = document.getElementById('key-ind');
        const promptEl   = document.getElementById('prompt');
        const genBtn     = document.getElementById('gen-btn');
        const copyBtn    = document.getElementById('copy-btn');
        const dlBtn      = document.getElementById('dl-btn');
        const preview    = document.getElementById('preview');
        const loading    = document.getElementById('loading-overlay');
        const dot        = document.getElementById('dot');
        const statusTxt  = document.getElementById('status-text');
        const foundry    = document.getElementById('foundry');
        const toast      = document.getElementById('toast');
        const toastMsg   = document.getElementById('toast-msg');

        let generatedHtml = '';

        // ── Restore saved key ─────────────────────────────────────────
        const savedKey = localStorage.getItem('autoui-key') || '';
        if (savedKey) {
            apiKeyEl.value = savedKey;
            markKeyOk();
        }

        // ── Key input listener ────────────────────────────────────────
        apiKeyEl.addEventListener('input', () => {
            const k = apiKeyEl.value.trim();
            if (k.length > 8) {
                if (k.startsWith('AQ.')) {
                    keyInd.textContent = '❌ Invalid format (must start with AIza)';
                    keyInd.className = 'key-indicator no';
                    keyInd.style.color = '#ef4444';
                } else {
                    markKeyOk();
                }
                localStorage.setItem('autoui-key', k);
            } else {
                keyInd.textContent = 'No key';
                keyInd.className = 'key-indicator no';
                keyInd.style.color = '';
            }
        });

        function markKeyOk() {
            keyInd.textContent = '✓ Set';
            keyInd.className = 'key-indicator ok';
            keyInd.style.color = '#4ade80';
        }

        // ── Example chips ─────────────────────────────────────────────
        document.querySelectorAll('.example-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                promptEl.value = chip.textContent.trim();
                promptEl.focus();
            });
        });

        // ── Copy / Download ───────────────────────────────────────────
        copyBtn.addEventListener('click', () => {
            if (!generatedHtml) { showToast('Generate a UI first!'); return; }
            navigator.clipboard.writeText(generatedHtml).then(() => showToast('HTML copied!'));
        });

        dlBtn.addEventListener('click', () => {
            if (!generatedHtml) { showToast('Generate a UI first!'); return; }
            const a = document.createElement('a');
            a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(generatedHtml);
            a.download = 'autoui.html';
            a.click();
            showToast('Downloaded!');
        });

        // ── Generate ──────────────────────────────────────────────────
        genBtn.addEventListener('click', generate);
        promptEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.ctrlKey) generate();
        });

        async function generate() {
            const key    = apiKeyEl.value.trim();
            const prompt = promptEl.value.trim();

            if (!key) {
                apiKeyEl.focus();
                showToast('⚠️ Please paste your API key first!');
                apiKeyEl.parentElement.style.borderColor = '#f87171';
                setTimeout(() => apiKeyEl.parentElement.style.borderColor = '', 2000);
                return;
            }
            if (!prompt) {
                promptEl.focus();
                showToast('⚠️ Please describe a UI first!');
                return;
            }

            // UI: loading state
            genBtn.disabled = true;
            genBtn.innerHTML = '<i class="fa-solid fa-spinner" style="animation:spin 1s linear infinite;margin-right:6px"></i>Generating...';
            loading.classList.add('show');
            dot.className = 'dot spinning';
            statusTxt.textContent = 'Generating...';

            const styleGuide = foundry.checked
                ? '\nStyle: dark premium UI, glassmorphism cards, blue-purple gradient accents, smooth animations, Fluent design inspiration.\n'
                : '';

            const sysPrompt = `You are a world-class frontend UI designer.
Generate a complete, stunning, production-ready HTML page.
Requirements:
- Include <script src="https://cdn.tailwindcss.com"><\/script> in the <head>
- Include <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> in the <head>
- Return ONLY valid raw HTML. No markdown. No code fences. No explanations.
- Make it visually stunning with real content (no lorem ipsum).${styleGuide}

User wants: ${prompt}`;

            try {
                if (key.startsWith('AQ.')) {
                    throw new Error('You pasted an OAuth token. Please go to aistudio.google.com/app/apikey and click "Create API key". A real key starts with "AIza".');
                }

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
                const headers = { 'Content-Type': 'application/json' };

                const res = await fetch(url, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: sysPrompt }] }]
                    })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    const msg = err?.error?.message || `HTTP Error ${res.status}`;
                    throw new Error(msg);
                }

                const data = await res.json();
                let html = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                // Strip markdown if present
                html = html.replace(/^```html\s*/i, '').replace(/^```\s*/i, '').replace(/```$/i, '').trim();

                if (!html) throw new Error('No HTML received from API');

                generatedHtml = html;
                preview.srcdoc = html;

                dot.className = 'dot';
                statusTxt.textContent = 'Done!';
                showToast('✨ UI Generated!');

            } catch (err) {
                console.error(err);
                dot.className = 'dot error';
                statusTxt.textContent = 'Error';
                showToast('❌ ' + err.message);
            } finally {
                genBtn.disabled = false;
                genBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles" style="margin-right:6px"></i>Generate UI';
                loading.classList.remove('show');
            }
        }

        // ── Toast ─────────────────────────────────────────────────────
        let toastTimer;
        function showToast(msg) {
            toastMsg.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
