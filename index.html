<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoUI - Autonomous Frontend Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white h-screen overflow-hidden">
    <div class="h-full flex flex-col">
        <!-- Navbar -->
        <nav class="bg-slate-800 border-b border-slate-700 px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-500 text-2xl"></i>
                <h1 class="text-2xl font-bold">AutoUI</h1>
                <span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full ml-1">by Swati Gupta</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm"><i class="fa-solid fa-circle text-green-500 text-xs mr-1"></i>Ready</span>
                <button id="settings-btn" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 px-3 py-2 rounded text-sm flex items-center gap-1.5 transition-colors">
                    <i class="fa-solid fa-gear"></i>
                    <span>Configure AI</span>
                </button>
                <button id="copy-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm"><i class="fa-solid fa-copy mr-1"></i>Copy</button>
                <button id="download-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm"><i class="fa-solid fa-download mr-1"></i>Download</button>
            </div>
        </nav>

        <!-- Settings Modal -->
        <div id="settings-modal" class="fixed inset-0 bg-black/75 backdrop-blur-sm z-50 hidden flex items-center justify-center">
            <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl text-white">
                <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fa-solid fa-gear text-blue-500 mr-2"></i> Agent Configuration</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">AI Provider</label>
                        <select id="provider-select" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                            <option value="gemini">Google Gemini (Default)</option>
                            <option value="azure">Microsoft Azure OpenAI Service</option>
                        </select>
                    </div>
                    <div id="gemini-config">
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Gemini API Key</label>
                        <input type="password" id="gemini-api-key" placeholder="Enter Gemini API Key..." class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div id="azure-config" class="space-y-3 hidden">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Azure Endpoint URL</label>
                            <input type="text" id="azure-endpoint" placeholder="e.g. https://my-resource.openai.azure.com" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Deployment Name</label>
                            <input type="text" id="azure-deployment" placeholder="e.g. gpt-4o" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Azure API Key</label>
                            <input type="password" id="azure-api-key" placeholder="Enter Azure API Key..." class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button id="close-settings" class="bg-slate-600 hover:bg-slate-500 text-white px-4 py-2 rounded text-sm font-medium transition-colors">Close</button>
                    <button id="save-settings" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium">Save Configuration</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Left Sidebar -->
            <div class="w-96 bg-slate-800 border-r border-slate-700 flex flex-col">
                <!-- Chat History -->
                <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <div class="bg-slate-700 rounded-lg p-3 text-sm">
                        <i class="fa-solid fa-robot text-blue-400 mr-2"></i>
                        <span>Hi! Paste your API key below and describe the UI you want to create.</span>
                    </div>
                </div>

                <!-- Microsoft Foundry IQ toggle -->
                <div class="px-4 py-3 border-t border-slate-700 bg-slate-900/60 flex justify-between items-center">
                    <div class="flex items-center gap-1.5">
                        <i class="fa-solid fa-brain text-blue-400 text-xs"></i>
                        <span class="text-xs font-semibold text-gray-300 uppercase tracking-wider">Foundry IQ Constraints</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="use-design-system" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>

                <!-- Input Area -->
                <div class="p-4 border-t border-slate-700 bg-slate-900 space-y-2">
                    <div class="flex items-center gap-2 bg-slate-800 border border-slate-600 rounded px-3 py-2">
                        <i class="fa-solid fa-key text-yellow-400 text-xs flex-shrink-0"></i>
                        <input type="password" id="inline-api-key" placeholder="Paste Gemini API key here..." class="flex-1 bg-transparent text-sm text-white focus:outline-none placeholder-gray-500 min-w-0">
                        <span id="key-status" class="text-xs text-gray-500 flex-shrink-0">No key</span>
                    </div>
                    <textarea id="prompt" rows="3" placeholder="E.g., Create a dark login page with neon effects..." class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 resize-none"></textarea>
                    <button id="send-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-2.5 rounded text-sm font-semibold transition-colors">
                        <i class="fa-solid fa-paper-plane mr-2"></i>Generate UI
                    </button>
                </div>
            </div>

            <!-- Right Preview -->
            <div class="flex-1 flex flex-col bg-white">
                <div class="bg-gray-200 border-b border-gray-300 px-4 py-2 flex justify-between items-center">
                    <span class="text-sm text-gray-700 font-medium">AutoUI Live Preview</span>
                    <span id="status" class="text-sm text-gray-600"><i class="fa-solid fa-circle text-green-500 text-xs mr-1"></i>Ready</span>
                </div>
                <div id="preview-container" class="flex-1 relative overflow-auto">
                    <iframe id="preview" class="w-full h-full border-0" srcdoc="<html><body style='display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#999;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);'><div style='text-align:center;'><h1 style='color:#333;margin:0;font-size:2rem;'>✨ AutoUI</h1><p style='color:#999;margin:12px 0 0;'>Paste your API key and describe a UI to get started</p></div></body></html>"></iframe>
                    <div id="loading" class="absolute inset-0 bg-white/80 hidden flex items-center justify-center">
                        <div class="text-center">
                            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-3"></div>
                            <p class="text-gray-700 font-semibold">Agent is designing...</p>
                            <p class="text-gray-500 text-sm mt-1">Generating with AI</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 hidden bg-gray-900 text-white px-4 py-3 rounded-lg shadow-lg text-sm">
        <i class="fa-solid fa-check mr-2"></i><span id="toast-text"></span>
    </div>

    <script>
        // DOM refs
        const promptInput    = document.getElementById('prompt');
        const sendBtn        = document.getElementById('send-btn');
        const chatHistory    = document.getElementById('chat-history');
        const preview        = document.getElementById('preview');
        const loading        = document.getElementById('loading');
        const statusEl       = document.getElementById('status');
        const copyBtn        = document.getElementById('copy-btn');
        const downloadBtn    = document.getElementById('download-btn');
        const inlineKeyInput = document.getElementById('inline-api-key');
        const keyStatus      = document.getElementById('key-status');
        const settingsBtn    = document.getElementById('settings-btn');
        const settingsModal  = document.getElementById('settings-modal');
        const closeSettings  = document.getElementById('close-settings');
        const saveSettings   = document.getElementById('save-settings');
        const providerSelect = document.getElementById('provider-select');
        const geminiCfgEl    = document.getElementById('gemini-config');
        const azureCfgEl     = document.getElementById('azure-config');
        const foundryToggle  = document.getElementById('use-design-system');

        let currentHtml = '';

        // Load saved config
        let cfg = JSON.parse(localStorage.getItem('autoui-cfg')) || {
            provider: 'gemini', geminiKey: '',
            azureEndpoint: '', azureDeployment: '', azureKey: ''
        };

        // Restore inline key if saved
        if (cfg.geminiKey) setKeyOk(cfg.geminiKey);

        function setKeyOk(k) {
            inlineKeyInput.value = k;
            keyStatus.textContent = '✓ Key set';
            keyStatus.className = 'text-xs text-green-400 flex-shrink-0';
        }

        // Inline key watcher
        inlineKeyInput.addEventListener('input', () => {
            const k = inlineKeyInput.value.trim();
            if (k.length > 8) {
                cfg.geminiKey = k;
                cfg.provider = 'gemini';
                localStorage.setItem('autoui-cfg', JSON.stringify(cfg));
                keyStatus.textContent = '✓ Key set';
                keyStatus.className = 'text-xs text-green-400 flex-shrink-0';
            } else {
                keyStatus.textContent = 'No key';
                keyStatus.className = 'text-xs text-gray-500 flex-shrink-0';
            }
        });

        // Settings modal
        function syncModal() {
            providerSelect.value = cfg.provider;
            document.getElementById('gemini-api-key').value   = cfg.geminiKey || '';
            document.getElementById('azure-endpoint').value   = cfg.azureEndpoint || '';
            document.getElementById('azure-deployment').value = cfg.azureDeployment || '';
            document.getElementById('azure-api-key').value    = cfg.azureKey || '';
            toggleProvider(cfg.provider);
        }
        function toggleProvider(p) {
            geminiCfgEl.classList.toggle('hidden', p !== 'gemini');
            azureCfgEl.classList.toggle('hidden', p === 'gemini');
        }

        providerSelect.addEventListener('change', e => toggleProvider(e.target.value));
        settingsBtn.addEventListener('click', () => { syncModal(); settingsModal.classList.remove('hidden'); });
        closeSettings.addEventListener('click', () => settingsModal.classList.add('hidden'));
        saveSettings.addEventListener('click', () => {
            cfg.provider        = providerSelect.value;
            cfg.geminiKey       = document.getElementById('gemini-api-key').value.trim();
            cfg.azureEndpoint   = document.getElementById('azure-endpoint').value.trim();
            cfg.azureDeployment = document.getElementById('azure-deployment').value.trim();
            cfg.azureKey        = document.getElementById('azure-api-key').value.trim();
            localStorage.setItem('autoui-cfg', JSON.stringify(cfg));
            if (cfg.provider === 'gemini' && cfg.geminiKey) setKeyOk(cfg.geminiKey);
            settingsModal.classList.add('hidden');
            addMsg('✅ Configuration saved! Ready to generate.', 'agent');
            showToast('Settings Saved!');
        });

        // Copy & Download
        copyBtn.addEventListener('click', () => {
            if (!currentHtml) { showToast('Generate a UI first!'); return; }
            navigator.clipboard.writeText(currentHtml).then(() => showToast('Copied!'));
        });
        downloadBtn.addEventListener('click', () => {
            if (!currentHtml) { showToast('Generate a UI first!'); return; }
            const a = document.createElement('a');
            a.href = 'data:text/html,' + encodeURIComponent(currentHtml);
            a.download = 'autoui-generated.html';
            a.click();
            showToast('Downloaded!');
        });

        // Generate
        sendBtn.addEventListener('click', generateUI);
        promptInput.addEventListener('keypress', e => { if (e.key === 'Enter' && e.ctrlKey) generateUI(); });

        async function generateUI() {
            const text = promptInput.value.trim();
            if (!text) { showToast('Enter a description first!'); return; }

            // Sync inline key into config
            const inlineKey = inlineKeyInput.value.trim();
            if (inlineKey) { cfg.geminiKey = inlineKey; cfg.provider = 'gemini'; }

            if (cfg.provider === 'gemini' && !cfg.geminiKey) {
                addMsg('⚠️ Please paste your Gemini API key in the field above the textarea.', 'agent');
                inlineKeyInput.focus();
                return;
            }
            if (cfg.provider === 'azure' && (!cfg.azureEndpoint || !cfg.azureKey || !cfg.azureDeployment)) {
                addMsg('⚠️ Click "Configure AI" to set up your Azure OpenAI credentials.', 'agent');
                return;
            }

            addMsg(text, 'user');
            promptInput.value = '';
            loading.classList.remove('hidden');
            statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1 text-blue-500"></i>Generating...';

            const foundryCtx = foundryToggle.checked
                ? '\nUse modern premium design: dark backgrounds, glassmorphism, blue/purple accents, Fluent-inspired UI, smooth animations.\n'
                : '';

            const sysPrompt = `You are an expert frontend UI designer. Generate a complete, beautiful, production-ready HTML page.
Always include: <script src="https://cdn.tailwindcss.com"><\/script>
Always include: <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
Return ONLY raw HTML. No markdown. No code fences. No explanation.${foundryCtx}`;

            try {
                let html = '';

                if (cfg.provider === 'gemini') {
                    const key = cfg.geminiKey;
                    const fullPrompt = sysPrompt + '\n\nUser request: ' + text;

                    // Support both AQ. (Bearer) and AIzaSy (?key=) formats
                    const useBearer = key.startsWith('AQ.');
                    const url = useBearer
                        ? 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent'
                        : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
                    const headers = useBearer
                        ? { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key }
                        : { 'Content-Type': 'application/json' };

                    const res = await fetch(url, {
                        method: 'POST', headers,
                        body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                    });

                    if (!res.ok) {
                        const e = await res.json().catch(() => ({}));
                        throw new Error(e?.error?.message || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    html = data.candidates[0].content.parts[0].text;

                } else {
                    const ep = cfg.azureEndpoint.replace(/\/$/, '');
                    const url = `${ep}/openai/deployments/${cfg.azureDeployment}/chat/completions?api-version=2024-02-15-preview`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'api-key': cfg.azureKey },
                        body: JSON.stringify({
                            messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: text }],
                            temperature: 0.7
                        })
                    });
                    if (!res.ok) throw new Error(`Azure error: HTTP ${res.status}`);
                    const data = await res.json();
                    html = data.choices[0].message.content;
                }

                html = html.replace(/^```html\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
                currentHtml = html;
                preview.srcdoc = html;
                addMsg('✨ Done! Your UI is live in the preview panel →', 'agent');
                showToast('UI Generated!');
                statusEl.innerHTML = '<i class="fa-solid fa-circle text-green-500 text-xs mr-1"></i>Ready';

            } catch (err) {
                console.error(err);
                addMsg('❌ ' + err.message, 'agent');
                showToast('Failed');
                statusEl.innerHTML = '<i class="fa-solid fa-circle text-red-500 text-xs mr-1"></i>Error';
            } finally {
                loading.classList.add('hidden');
            }
        }

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user'
                ? 'bg-blue-600 rounded-lg p-3 text-sm ml-6'
                : 'bg-slate-700 rounded-lg p-3 text-sm mr-6';
            div.innerHTML = `<i class="fa-solid fa-${sender === 'user' ? 'user' : 'robot'} mr-2 opacity-70"></i>${text}`;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>
